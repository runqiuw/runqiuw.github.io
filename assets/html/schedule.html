const semesterStartDate = new Date(2026, 4, 11); // May 11, 2026
const holidays = {
  '2026-06-19': 'Dragon Boat Festival'
};

const getShanghaiTime = () => new Date(new Date().toLocaleString('en-US', { timeZone: 'Asia/Shanghai' }));

function App() {
  const [selectedEvent, setSelectedEvent] = useState(null);
  const [currentTime, setCurrentTime] = useState(getShanghaiTime());
  const [viewMode, setViewMode] = useState('week'); // 'week' | 'month'

  useEffect(() => {
    const timer = setInterval(() => {
      setCurrentTime(getShanghaiTime());
    }, 60000);
    return () => clearInterval(timer);
  }, []);

  const currentYear = currentTime.getFullYear();
  const currentMonth = String(currentTime.getMonth() + 1).padStart(2, '0');
  const currentDayStr = String(currentTime.getDate()).padStart(2, '0');
  const currentDateString = `${currentYear}-${currentMonth}-${currentDayStr}`;

  const actualCurrentWeek = useMemo(() => {
    const start = new Date(semesterStartDate);
    const current = new Date(currentTime.getFullYear(), currentTime.getMonth(), currentTime.getDate());
    const diffTime = current.getTime() - start.getTime();
    const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
    if (diffDays < 0) return 1;
    return Math.floor(diffDays / 7) + 1;
  }, []);

  const [currentWeek, setCurrentWeek] = useState(Math.max(1, Math.min(13, actualCurrentWeek)));
  const [calendarMonth, setCalendarMonth] = useState(new Date(currentTime.getFullYear(), currentTime.getMonth(), 1));

  const startHour = 8;
  const endHour = 18;
  const hours = Array.from({ length: endHour - startHour + 1 }, (_, i) => startHour + i);

  // Returns one of: 'exam' | 'required' | 'optional'
  // Defaults to 'required' for any non-exam session.
  const getSessionState = (session, week) => {
    if (session.isExam) return 'exam';
    const attendanceRequired = typeof session.attendanceRequired === 'function'
      ? session.attendanceRequired(week)
      : session.attendanceRequired;
    if (attendanceRequired === false) return 'optional';
    return 'required';
  };

  const getCourseLabel = (course, session) => {
    const baseLabel = course.code || course.shortName || course.name;
    return session.type === 'lab' ? 'LAB' : baseLabel;
  };

  // Compute week index for an arbitrary Date (1-13 if within semester, otherwise null)
  const weekForDate = (date) => {
    const start = new Date(semesterStartDate);
    const d = new Date(date.getFullYear(), date.getMonth(), date.getDate());
    const diffDays = Math.floor((d.getTime() - start.getTime()) / (1000 * 60 * 60 * 24));
    if (diffDays < 0) return null;
    const week = Math.floor(diffDays / 7) + 1;
    if (week < 1 || week > 13) return null;
    return week;
  };

  // Sessions on a given Date (Mon-Fri only; weekends return [])
  const sessionsOnDate = (date) => {
    const jsDay = date.getDay(); // 0=Sun..6=Sat
    if (jsDay === 0 || jsDay === 6) return [];
    const day = jsDay; // Mon=1..Fri=5
    const week = weekForDate(date);
    if (week === null) return [];
    const dateString = formatDateString(date);
    const isHoliday = !!holidays[dateString];
    const list = [];
    scheduleData.forEach(course => {
      course.sessions.forEach(session => {
        if (session.day !== day) return;
        if (!session.validWeeks(week)) return;
        if (isHoliday && !session.isExam) return;
        list.push({ course, session, week });
      });
    });
    return list;
  };

  const formatDateString = (date) => {
    const y = date.getFullYear();
    const m = String(date.getMonth() + 1).padStart(2, '0');
    const d = String(date.getDate()).padStart(2, '0');
    return `${y}-${m}-${d}`;
  };


  const getDaysDataForWeek = (week) => {
    return [1, 2, 3, 4, 5].map(dayIndex => {
      const date = new Date(semesterStartDate);
      date.setDate(semesterStartDate.getDate() + (week - 1) * 7 + (dayIndex - 1));

      const year = date.getFullYear();
      const monthStr = String(date.getMonth() + 1).padStart(2, '0');
      const dayStr = String(date.getDate()).padStart(2, '0');

      const dateString = `${year}-${monthStr}-${dayStr}`;
      const displayDate = `${monthStr}/${dayStr}`;
      const dayNames = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri'];

      return {
        day: dayIndex,
        name: dayNames[dayIndex - 1],
        displayDate: displayDate,
        dateString: dateString,
        isHoliday: !!holidays[dateString],
        holidayName: holidays[dateString]
      };
    });
  };

  const currentDaysData = getDaysDataForWeek(currentWeek);

  const getEventStyle = (start, end) => {
    const [startH, startM] = start.split(':').map(Number);
    const [endH, endM] = end.split(':').map(Number);

    const topMinutes = ((startH - startHour) * 60) + startM;
    const durationMinutes = ((endH - startH) * 60) + (endM - startM);

    return {
      top: `${topMinutes}px`,
      height: `${durationMinutes}px`,
    };
  };

  const currentHour = currentTime.getHours();
  const currentMinute = currentTime.getMinutes();
  const timeOffsetMinutes = ((currentHour - startHour) * 60) + currentMinute;

  return (
    <div className="bg-gray-50 text-gray-800 p-4 md:p-8 font-sans">
      <div className="max-w-6xl mx-auto">

        {/* Header */}
        <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 mb-6">
          <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
            <div>
              <h1 className="text-2xl font-bold text-gray-900 flex items-center gap-2">
                <Calendar className="text-indigo-600" />
                2026 Summer Semester Schedule
              </h1>
              <div className="mt-2 inline-flex items-center gap-1.5 text-xs font-medium text-indigo-700 bg-indigo-50 px-2.5 py-1 rounded-md border border-indigo-100">
                <Clock size={14} />
                <span>
                  Beijing Time: {currentDateString} {String(currentHour).padStart(2, '0')}:{String(currentMinute).padStart(2, '0')}
                </span>
              </div>
            </div>

            <div className="flex flex-col gap-3 items-stretch md:items-end">
              {/* View toggle */}
              <div className="inline-flex bg-gray-100 rounded-lg p-1 self-start md:self-end">
                <button
                  onClick={() => setViewMode('week')}
                  className={`px-3 py-1.5 text-xs font-semibold rounded-md transition-colors ${viewMode === 'week' ? 'bg-white text-indigo-700 shadow-sm' : 'text-gray-500 hover:text-gray-700'}`}
                >
                  Week
                </button>
                <button
                  onClick={() => setViewMode('month')}
                  className={`px-3 py-1.5 text-xs font-semibold rounded-md transition-colors ${viewMode === 'month' ? 'bg-white text-indigo-700 shadow-sm' : 'text-gray-500 hover:text-gray-700'}`}
                >
                  Calendar
                </button>
              </div>

              {viewMode === 'week' ? (
                <div className="flex items-center bg-gray-50 p-2 rounded-xl border border-gray-200">
                  <button
                    onClick={() => setCurrentWeek(Math.max(1, currentWeek - 1))}
                    className="p-2 hover:bg-white rounded-lg shadow-sm disabled:opacity-30 disabled:shadow-none transition-all"
                    disabled={currentWeek === 1}
                  >
                    <ChevronLeft size={20} />
                  </button>
                  <div className="w-48 px-4 text-center">
                    <div className="font-semibold text-indigo-700">Week {currentWeek}</div>
                    <div className="text-xs text-gray-500">
                      {currentDaysData[0].displayDate} - {currentDaysData[4].displayDate}
                    </div>
                  </div>
                  <button
                    onClick={() => setCurrentWeek(Math.min(13, currentWeek + 1))}
                    className="p-2 hover:bg-white rounded-lg shadow-sm disabled:opacity-30 disabled:shadow-none transition-all"
                    disabled={currentWeek === 13}
                  >
                    <ChevronRight size={20} />
                  </button>
                </div>
              ) : (
                <div className="flex items-center bg-gray-50 p-2 rounded-xl border border-gray-200">
                  <button
                    onClick={() => setCalendarMonth(new Date(calendarMonth.getFullYear(), calendarMonth.getMonth() - 1, 1))}
                    className="p-2 hover:bg-white rounded-lg shadow-sm transition-all"
                  >
                    <ChevronLeft size={20} />
                  </button>
                  <div className="w-48 px-4 text-center">
                    <div className="font-semibold text-indigo-700">
                      {calendarMonth.toLocaleString('en-US', { month: 'long', year: 'numeric' })}
                    </div>
                  </div>
                  <button
                    onClick={() => setCalendarMonth(new Date(calendarMonth.getFullYear(), calendarMonth.getMonth() + 1, 1))}
                    className="p-2 hover:bg-white rounded-lg shadow-sm transition-all"
                  >
                    <ChevronRight size={20} />
                  </button>
                </div>
              )}
            </div>
          </div>

          {viewMode === 'week' && (
            <div className="mt-6">
              <input
                type="range"
                min="1"
                max="13"
                value={currentWeek}
                onChange={(e) => setCurrentWeek(parseInt(e.target.value))}
                className="w-full accent-indigo-600 cursor-pointer"
              />
              <div className="flex justify-between text-xs text-gray-400 px-1 mt-2">
                <span>W1</span><span>W3</span><span>W5</span><span className="font-bold text-red-400">W6</span><span>W7</span><span>W9</span><span>W11</span><span>W13(Final)</span>
              </div>
            </div>
          )}

          {viewMode === 'month' && (
            <div className="mt-5 flex flex-wrap items-center justify-between gap-3 text-xs text-gray-600">
              <div className="flex flex-wrap items-center gap-3">
                <div className="flex items-center gap-1.5"><span className="inline-block w-3 h-3 rounded-sm bg-red-500"></span>考试</div>
                <div className="flex items-center gap-1.5"><span className="inline-block w-3 h-3 rounded-sm bg-indigo-500"></span>必到</div>
                <div className="flex items-center gap-1.5"><span className="inline-block w-3 h-3 rounded-sm bg-gray-400"></span>选到</div>
              </div>
              <div className="flex items-center gap-1.5 ml-auto"><span className="inline-block w-3 h-3 rounded-sm bg-red-100 border border-red-200"></span>节假日</div>
            </div>
          )}
        </div>

        {/* Schedule grid (week view) */}
        {viewMode === 'week' && (
        <div className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
          <div className="overflow-x-hidden">
            <div className="min-w-[800px] flex">

              <div className="w-16 flex-shrink-0 bg-gray-50/50 border-r border-gray-100 relative">
                <div className="h-14 border-b border-gray-100 bg-white"></div>
                {hours.map(hour => (
                  <div key={hour} className={`h-[60px] relative text-xs text-gray-400 font-medium ${hour === 11 ? 'border-b-2 border-gray-400' : 'border-b border-gray-100'}`}>
                    <span className="absolute -top-2.5 w-full text-center bg-gray-50/50 block">{hour}:00</span>
                  </div>
                ))}
              </div>

              <div className="flex-1 flex bg-gray-50/30">
                {currentDaysData.map((dayData, index) => {
                  const isToday = dayData.dateString === currentDateString;
                  const showIndicator = isToday && timeOffsetMinutes >= 0 && timeOffsetMinutes <= (endHour - startHour) * 60;

                  return (
                    <div key={dayData.day} className={`flex-1 border-r border-gray-100 last:border-r-0 relative min-w-[140px] ${dayData.isHoliday ? 'bg-red-50/30' : isToday ? 'bg-indigo-50/20' : ''}`}>

                      <div className={`h-14 border-b border-gray-100 flex flex-col items-center justify-center sticky top-0 z-20 transition-colors ${dayData.isHoliday ? 'bg-red-50' : isToday ? 'bg-indigo-50' : 'bg-white'}`}>
                        {isToday && <div className="absolute top-0 left-0 right-0 h-1 bg-indigo-500"></div>}
                        <div className="flex items-center gap-1.5">
                          <span className={`text-sm font-bold ${dayData.isHoliday ? 'text-red-600' : isToday ? 'text-indigo-700' : 'text-gray-700'}`}>
                            {dayData.name}
                          </span>
                          <span className={`text-xs ${dayData.isHoliday ? 'text-red-400' : isToday ? 'text-indigo-500 font-semibold' : 'text-gray-400'}`}>
                            {dayData.displayDate}
                          </span>
                        </div>
                        {dayData.isHoliday && (
                          <span className="text-[10px] font-bold text-red-500 mt-0.5 bg-red-100 px-1.5 rounded-sm">
                            {dayData.holidayName}
                          </span>
                        )}
                        {isToday && !dayData.isHoliday && (
                          <span className="text-[10px] font-bold text-indigo-500 mt-0.5 px-1.5">
                            Today
                          </span>
                        )}
                      </div>

                      <div className="relative w-full" style={{ height: `${hours.length * 60}px` }}>
                        <div className="absolute inset-0 flex flex-col pointer-events-none">
                          {hours.map(h => <div key={`grid-${h}`} className={`h-[60px] w-full ${h === 11 ? 'border-b-2 border-gray-400/60' : 'border-b border-gray-100/50'}`} />)}
                        </div>

                        {dayData.isHoliday && (
                          <div className="absolute inset-0 flex items-center justify-center pointer-events-none z-10 overflow-hidden">
                            <div className="text-4xl font-black text-red-500/10 -rotate-45 whitespace-nowrap">
                              NO CLASS
                            </div>
                          </div>
                        )}

                        {showIndicator && (
                          <div
                            className="absolute left-0 right-0 z-30 flex items-center pointer-events-none"
                            style={{ top: `${timeOffsetMinutes}px` }}
                          >
                            <div className="w-2.5 h-2.5 rounded-full bg-red-500 shadow-sm -ml-1.5 relative z-10"></div>
                            <div className="flex-1 h-[2px] bg-red-500 shadow-sm -ml-1 opacity-80"></div>
                          </div>
                        )}

                        {scheduleData.map(course =>
                          course.sessions
                            .filter(s => s.day === index + 1 && s.validWeeks(currentWeek) && (!dayData.isHoliday || s.isExam))
                            .map((session, i) => {
                              const sessionState = getSessionState(session, currentWeek);
                              return (
                                <div
                                  key={`${course.id}-${i}`}
                                  onClick={() => setSelectedEvent({ ...course, session, specificDate: dayData.dateString })}
                                  className={`absolute left-1 right-1 rounded-lg p-2 cursor-pointer border overflow-hidden transition-all duration-200 hover:shadow-md hover:scale-[1.02] shadow-sm z-20 ${session.isExam ? 'bg-red-50 border-red-300 text-red-800 hover:bg-red-100 border-l-4 ring-2 ring-red-300/60' : `${course.color} border-l-4`}`}
                                  style={{
                                    ...getEventStyle(session.start, session.end),
                                    borderLeftColor: 'currentColor'
                                  }}
                                >
                                  {session.isExam && (
                                    <div className="absolute top-1 right-1 bg-red-500 text-white text-[9px] font-bold px-1.5 py-0.5 rounded-sm leading-none z-10">
                                      考试
                                    </div>
                                  )}
                                  {sessionState === 'optional' && (
                                    <div className="absolute top-1 right-1 bg-gray-400 text-white text-[9px] font-bold px-1.5 py-0.5 rounded-sm leading-none z-10">
                                      选到
                                    </div>
                                  )}
                                  <div className="font-bold text-xs sm:text-sm leading-tight truncate pr-8">
                                    {getCourseLabel(course, session)}
                                  </div>
                                  <div className="mt-1 flex flex-col gap-0.5 text-[10px] sm:text-[11px] opacity-90">
                                    <div className="flex items-center gap-1 font-medium">
                                      <MapPin size={11} className="flex-shrink-0" />
                                      <span className="truncate">
                                        {typeof session.location === 'function' ? session.location(currentWeek) : session.location}
                                      </span>
                                    </div>
                                    <div className="flex items-center gap-1">
                                      <Clock size={11} className="flex-shrink-0" />
                                      {session.start} - {session.end}
                                    </div>
                                    <div className="mt-0.5 px-1 py-0.5 bg-black/5 rounded-sm inline-block w-max font-semibold">
                                      {session.note}
                                    </div>
                                  </div>
                                </div>
                              );
                            })
                        )}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          </div>
        </div>
        )}

        {/* Calendar grid (month view) */}
        {viewMode === 'month' && (() => {
          const year = calendarMonth.getFullYear();
          const month = calendarMonth.getMonth();
          const firstDay = new Date(year, month, 1);
          const lastDay = new Date(year, month + 1, 0);
          // Start the calendar grid on the Monday of the week containing the 1st
          const startOffset = (firstDay.getDay() + 6) % 7; // 0=Mon..6=Sun
          const gridStart = new Date(year, month, 1 - startOffset);
          // Always render 6 weeks (42 cells) for a stable layout
          const cells = [];
          for (let i = 0; i < 42; i++) {
            const d = new Date(gridStart);
            d.setDate(gridStart.getDate() + i);
            cells.push(d);
          }
          const weekdayLabels = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
          const stateStyles = {
            exam: 'bg-red-500 text-white',
            required: 'bg-indigo-500 text-white',
            optional: 'bg-gray-300 text-gray-700'
          };

          return (
            <div className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
              <div className="grid grid-cols-7 bg-gray-50 border-b border-gray-100">
                {weekdayLabels.map((label, i) => (
                  <div key={label} className={`px-2 py-2 text-xs font-bold text-center ${i >= 5 ? 'text-gray-400' : 'text-gray-600'}`}>
                    {label}
                  </div>
                ))}
              </div>
              <div className="grid grid-cols-7">
                {cells.map((d, idx) => {
                  const inMonth = d.getMonth() === month;
                  const dateStr = formatDateString(d);
                  const isWeekend = d.getDay() === 0 || d.getDay() === 6;
                  const isHoliday = isWeekend || !!holidays[dateStr];
                  const holidayName = holidays[dateStr];
                  const isToday = dateStr === currentDateString;
                  const sessions = sessionsOnDate(d);
                  const week = weekForDate(d);

                  const bg = isHoliday
                    ? 'bg-red-50'
                    : isToday
                    ? 'bg-indigo-50/60'
                    : inMonth ? 'bg-white' : 'bg-gray-50/50';

                  return (
                    <div
                      key={idx}
                      className={`min-h-[96px] border-b border-r border-gray-100 p-1.5 ${bg} ${inMonth ? '' : 'opacity-60'}`}
                    >
                      <div className="flex items-center justify-between mb-1">
                        <div className="flex items-center gap-1">
                          <span className={`text-xs font-bold ${isHoliday ? 'text-red-600' : isToday ? 'text-indigo-700' : inMonth ? 'text-gray-700' : 'text-gray-400'}`}>
                            {d.getDate()}
                          </span>
                          {week !== null && d.getDay() === 1 && (
                            <span className="text-[9px] text-gray-400 font-medium">W{week}</span>
                          )}
                        </div>
                        {holidayName && (
                          <span className="text-[9px] font-bold text-red-500 bg-red-100 px-1 rounded-sm leading-none py-0.5">
                            {holidayName}
                          </span>
                        )}
                      </div>
                      <div className="flex flex-col gap-0.5">
                        {sessions.map(({ course, session }, i) => {
                          const state = getSessionState(session, week);
                          return (
                            <button
                              key={`${course.id}-${i}`}
                              onClick={() => setSelectedEvent({ ...course, session, specificDate: dateStr })}
                              className={`text-left text-[10px] leading-tight px-1.5 py-0.5 rounded-sm font-semibold truncate hover:opacity-80 transition-opacity ${stateStyles[state]}`}
                              title={`${course.name} ${session.start}-${session.end}`}
                            >
                              {state === 'exam' && '★ '}
                              {getCourseLabel(course, session)}
                            </button>
                          );
                        })}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          );
        })()}
      </div>

      {/* Detail modal */}
      {selectedEvent && (
        <div className="fixed inset-0 bg-gray-900/40 backdrop-blur-sm flex items-center justify-center p-4 z-50 overflow-y-auto" onClick={() => setSelectedEvent(null)}>
          <div
            className="bg-white rounded-2xl shadow-xl w-full max-w-md overflow-hidden transform transition-all"
            onClick={e => e.stopPropagation()}
          >
            <div className={`${selectedEvent.tagColor} h-2 w-full`}></div>
            <div className="p-6">
              <div className="flex justify-between items-start mb-4">
                <div>
                  <div className="flex items-center gap-2">
                    <h2 className="text-xl font-bold text-gray-900">{selectedEvent.name}</h2>
                    {selectedEvent.session.isExam && (
                      <span className="bg-red-500 text-white text-[10px] font-bold px-2 py-0.5 rounded-sm">考试</span>
                    )}
                  </div>
                  <p className="text-sm text-gray-500 font-medium">{selectedEvent.englishName}</p>
                </div>
                <button
                  onClick={() => setSelectedEvent(null)}
                  className="p-1.5 bg-gray-100 hover:bg-gray-200 rounded-full text-gray-500 transition-colors"
                >
                  <X size={18} />
                </button>
              </div>

              <div className="space-y-4 mt-6">
                <div className="flex items-start gap-3">
                  <div className="p-2 bg-indigo-50 text-indigo-600 rounded-lg">
                    <Calendar size={18} />
                  </div>
                  <div>
                    <div className="text-sm font-semibold text-gray-900">Class Date</div>
                    <div className="text-sm text-gray-600">{selectedEvent.specificDate} (Week {currentWeek})</div>
                  </div>
                </div>

                <div className="flex items-start gap-3">
                  <div className="p-2 bg-indigo-50 text-indigo-600 rounded-lg">
                    <Clock size={18} />
                  </div>
                  <div>
                    <div className="text-sm font-semibold text-gray-900">Time</div>
                    <div className="text-sm text-gray-600">
                      {['Monday','Tuesday','Wednesday','Thursday','Friday'][selectedEvent.session.day - 1]} {selectedEvent.session.start} - {selectedEvent.session.end}
                    </div>
                    <div className="text-xs text-indigo-600 font-medium mt-0.5 bg-indigo-50 inline-block px-2 py-0.5 rounded">
                      {selectedEvent.session.note}
                    </div>
                  </div>
                </div>

                <div className="flex items-start gap-3">
                  <div className="p-2 bg-indigo-50 text-indigo-600 rounded-lg">
                    <MapPin size={18} />
                  </div>
                  <div>
                    <div className="text-sm font-semibold text-gray-900">Location</div>
                    <div className="text-sm text-gray-600">
                      {typeof selectedEvent.session.location === 'function'
                        ? selectedEvent.session.location(currentWeek)
                        : selectedEvent.session.location}
                    </div>
                  </div>
                </div>

                <div className="flex items-start gap-3">
                  <div className="p-2 bg-indigo-50 text-indigo-600 rounded-lg">
                    <User size={18} />
                  </div>
                  <div>
                    <div className="text-sm font-semibold text-gray-900">Instructor</div>
                    <div className="text-sm text-gray-600">{selectedEvent.session.instructor || selectedEvent.instructor}</div>
                  </div>
                </div>

                {selectedEvent.session.specialNote && (
                  <div className="flex items-start gap-3">
                    <div className="p-2 bg-amber-50 text-amber-600 rounded-lg flex-shrink-0">
                      <Info size={18} />
                    </div>
                    <div>
                      <div className="text-sm font-semibold text-gray-900">Notes</div>
                      <div className="text-sm text-gray-600 whitespace-pre-line">{selectedEvent.session.specialNote}</div>
                    </div>
                  </div>
                )}
              </div>

            </div>
            <div className="bg-gray-50 px-6 py-4 border-t border-gray-100 flex justify-end">
              <button
                onClick={() => setSelectedEvent(null)}
                className="px-4 py-2 bg-white border border-gray-200 hover:bg-gray-50 text-gray-700 text-sm font-medium rounded-lg shadow-sm transition-colors"
              >
                Close
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>

<script>
(function () {
  const DESIGN_WIDTH = 880;
  const MIN_HEIGHT = 600;
  const wrapper = document.getElementById('scale-wrapper');
  const outer = document.getElementById('scale-outer');
  const root = document.getElementById('root');

  function applyScale() {
    const available = window.innerWidth;
    const scale = Math.min(1, available / DESIGN_WIDTH);
    wrapper.style.transform = 'scale(' + scale + ')';
    const contentHeight = Math.max(
      wrapper.scrollHeight,
      root ? root.scrollHeight : 0,
      wrapper.getBoundingClientRect().height / (scale || 1)
    );
    const scaledHeight = Math.max(MIN_HEIGHT, Math.ceil(contentHeight * scale));
    outer.style.height = scaledHeight + 'px';
    try {
      window.parent.postMessage(
        { type: 'schedule-resize', height: scaledHeight },
        '*'
      );
    } catch (e) {}
  }

  window.addEventListener('resize', applyScale);
  window.addEventListener('load', applyScale);
  if (window.ResizeObserver) {
    new ResizeObserver(applyScale).observe(wrapper);
  }
  // Run once after React mounts
  setTimeout(applyScale, 0);
  setTimeout(applyScale, 100);
  setTimeout(applyScale, 500);
})();
</script>
</body>
</html>
